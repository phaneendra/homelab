http:
  middlewares:
    lan-only:
      ipAllowList:
        sourceRange:
          - "192.168.0.0/24"

    secure-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        referrerPolicy: strict-origin-when-cross-origin

  routers:
    pmox1:
      rule: "Host(`pve.phanee.in`)"
      entryPoints:
        - websecure
      middlewares:
        - secure-headers
        - lan-only
      service: pmox1
      tls:
        certResolver: letsencrypt

    pihole:
      rule: "Host(`pihole.phanee.in`)"
      entryPoints:
        - websecure
      middlewares:
        - secure-headers
        - lan-only
      service: pihole
      tls:
        certResolver: letsencrypt

    arcane:
      rule: "Host(`arcane.phanee.in`)"
      entryPoints:
        - websecure
      middlewares:
        - secure-headers
        - lan-only
      service: arcane
      tls:
        certResolver: letsencrypt

  serversTransports:
    insecureSkipVerify:
      insecureSkipVerify: true

  services:
    pmox1:
      loadBalancer:
        serversTransport: insecureSkipVerify
        servers:
          - url: "https://192.168.0.8:8006"

    pihole:
      loadBalancer:
        serversTransport: insecureSkipVerify
        servers:
          - url: "https://192.168.0.12"

    arcane:
      loadBalancer:
        serversTransport: insecureSkipVerify
        servers:
          - url: "https://192.168.0.11:3552"