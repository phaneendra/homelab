http:
  middlewares:
    lan-only:
      ipAllowList:
        sourceRange:
          - "192.168.0.0/24"
          - "127.0.0.1/32"   # IPv4 Localhost/Loopback
          - "fc00::/7"       # Unique Local IPv6 addresses
          - "fe80::/10"      # Link-Local IPv6 addresses
          - "::1/128"        # IPv6 Loopback address
          - "2406:7400::/32" # Allows your specific ISP IPv6 network range

    secure-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        referrerPolicy: strict-origin-when-cross-origin

  routers:
    pmox1:
      rule: "Host(`pve.phanee.in`)"
      entryPoints:
        - websecure
      middlewares:
        - secure-headers
        - lan-only
      service: pmox1
      tls:
        certResolver: letsencrypt

    pihole:
      rule: "Host(`pihole.phanee.in`)"
      entryPoints:
        - websecure
      middlewares:
        - secure-headers
        - lan-only
      service: pihole
      tls:
        certResolver: letsencrypt

    arcane:
      rule: "Host(`arcane.phanee.in`)"
      entryPoints:
        - websecure
      middlewares:
        - secure-headers
        - lan-only
      service: arcane
      tls:
        certResolver: letsencrypt

  serversTransports:
    insecureSkipVerify:
      insecureSkipVerify: true

  services:
    pmox1:
      loadBalancer:
        servers:
          - url: "http://192.168.0.8:8006"

    pihole:
      loadBalancer:
        serversTransport: insecureSkipVerify 
        servers:
          - url: "http://192.168.0.12:80"

    arcane:
      loadBalancer:
        servers:
          - url: "http://192.168.0.11:3552"