services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: shared-postgres
    restart: unless-stopped
    # Expands shared memory allocation from default 64MB to 1GB for vector indices
    shm_size: '1gb'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      MULTIPLE_DATABASES: ${MULTIPLE_DATABASES:-}
    # expose:
    #   - "5432"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - /mnt/shared-storage/postgres/init-scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "${POSTGRES_USER:-postgres}" -d "${POSTGRES_DB:-postgres}"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      # Absolute path to your VirtioFS 650GB storage location
      device: '/mnt/shared-storage/postgres'

networks:
  dokploy-network:
    external: true
