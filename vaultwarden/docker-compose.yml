services:
  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    environment:
      WEBSOCKET_ENABLED: true
      DOMAIN: ${DOMAIN:-https://vaultwarden.phanee.in}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?Set ADMIN_TOKEN in your environment}
      SIGNUPS_ALLOWED: ${SIGNUPS_ALLOWED:-false}
      INVITATIONS_ALLOWED: ${INVITATIONS_ALLOWED:-false}
      ROCKET_PORT: 80
      ROCKET_WORKERS: 4
    volumes:
      - vaultwarden-data:/data
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - dokploy-network

volumes:
  vaultwarden-data:

networks:
  dokploy-network:
    external: true
