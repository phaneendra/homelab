services:
  opencloud-web:
    image: opencloudeu/opencloud:latest # Pulls stable downstream OpenCloud binary
    restart: unless-stopped
     # 🔄 AUTOMATED SELF-HEALING RECREATION WRAPPER
    entrypoint: /bin/sh
    command: ["-c", "if [ ! -f /etc/opencloud/opencloud.yaml ]; then opencloud init; fi; opencloud server"]
    expose:
      - "9200"
    networks:
      - dokploy-network
    volumes:
      # Shared Storage for system variables, configs, metadata indexes
      - opencloud_config:/etc/opencloud
      # Shared Storage for bulk user files, media uploads, and assets
      - opencloud_data:/var/lib/opencloud
    environment:
      # General Settings
      - OC_URL=${OC_URL} # e.g. https://opencloud.yourdomain.com
      - OC_LOG_LEVEL=warn # e.g. debug, info, warn, error
      - OC_INSECURE=true # Tells internal microservices that HTTP behind proxy is safe
      - PROXY_TLS=false # Bypasses local SSL certificate checks inside the container
      - PROXY_HTTP_ADDR=0.0.0.0:9200
      - PROXY_OIDC_REWRITE_WELLKNOWN=true
      - PROXY_ENABLE_BASIC_AUTH=false
      # 🚀 THE REDIRECT RESOLUTION KEY:
      # Forces OpenCloud's internal OIDC identity provider to accept cookie tokens over HTTP behind Traefik
      - OC_JWT_SECRET_SECURE=false
      # 🚀 MANDATORY EXTENSION ENABLER FLAGS FOR ONLYOFFICE INTEGRATION:
      - COLLABORATION_ENABLED=true
      - COLLABORATION_APP_PRODUCT=OnlyOffice
      - COLLABORATION_APP_ADDR=http://onlyoffice:80 # Routes backend file transfers internally 
      - COLLABORATION_APP_INSECURE=true
      # 🔐 MUST match your onlyoffice JWT_SECRET token string exactly
      - COLLABORATION_JWT_SECRET=${ONLYOFFICE_JWT_SECRET}

    
    # 🌐 TRAEFIK PROXY HEADER INJECTIONS (Brakes the Redirect Loop)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opencloud-router.entrypoints=web"
      - "traefik.http.routers.opencloud-router.rule=Host(`opencloud.phanee.in`)"
      - "traefik.http.routers.opencloud-router.middlewares=opencloud-headers"
      - "traefik.http.middlewares.opencloud-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.opencloud-headers.headers.sslproxyheaders.X-Forwarded-Proto=https"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    expose:
      - "80"
    security_opt:
      - no-new-privileges:true
    networks:
      - dokploy-network
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    environment:
      # Token authentication ensures public instances can't hijack your document server
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
      - JWT_HEADER=AuthorizationJwt
      # Instruct OnlyOffice to bypass internal database loops and use your shared Postgres
      - DB_TYPE=postgres
      - DB_HOST=shared-postgres # Points directly to internal compose DNS name
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=${ONLYOFFICE_DB_USER}
      - DB_PASSWORD=${ONLYOFFICE_DB_PASSWORD}
      # Bypasses local routing blocks for local Docker-to-Docker routing loops
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - USE_UNAUTHORIZED_STORAGE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s # OnlyOffice can take longer to complete its initial structural compilation

volumes:
  # Local-LVM volumes
  opencloud_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/shared-storage/opencloud-data/config
  
  # Bound named volume for user bulk storage
  onlyoffice_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/shared-storage/onlyoffice/data

  onlyoffice_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/shared-storage/onlyoffice/logs
  
  opencloud_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/shared-storage/opencloud-data

networks:
  dokploy-network:
    external: true
